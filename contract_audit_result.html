<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contract Review Result</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #232935;
    --text-muted: #6b7280;
    --text-soft: #8a909c;
    --border: #e6e8ec;
    --border-soft: #eef0f3;
    --accent: #33507e;
    --accent-soft: #eef2f9;

    --green-bg: #ebf6ef;
    --green-text: #1f7a4d;
    --green-border: #d3e9dd;

    --red-bg: #fbedec;
    --red-text: #b23b32;
    --red-border: #f0d5d3;

    --orange-bg: #fbf0e6;
    --orange-text: #b0691f;
    --orange-border: #f0ddc8;

    --amber-bg: #fbf6e3;
    --amber-text: #93761a;
    --amber-border: #eee5c1;

    --review-bg: #eef1fb;
    --review-text: #4a4f93;
    --review-border: #dde1f5;

    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 9px;
    --shadow: 0 1px 3px rgba(23, 30, 46, 0.05), 0 1px 2px rgba(23, 30, 46, 0.03);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Segoe UI Emoji", sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* Header */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .app-header h1 {
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .app-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 18px;
    color: var(--text-muted);
    font-size: 15px;
  }
  .app-meta span strong {
    color: var(--text);
    font-weight: 500;
  }
  .ai-tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .ai-tag .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
  }

  /* Overall result */
  .overall {
    padding: 28px 32px;
    margin-bottom: 20px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .ring-wrap { flex-shrink: 0; }
  .ring {
    position: relative;
    width: 132px;
    height: 132px;
  }
  .ring svg { transform: rotate(-90deg); }
  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ring-pct { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; }
  .ring-cap { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .overall-body { flex: 1; min-width: 260px; }
  .decision-badge {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 15px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .decision-badge .ic { width: 18px; height: 18px; }
  .overall-explain {
    font-size: 16px;
    color: var(--text);
    margin: 0 0 16px;
    max-width: 560px;
  }
  .overall-facts {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 28px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .overall-facts span strong { color: var(--text); font-weight: 600; }

  /* Summary row */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .summary-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .summary-num { font-size: 26px; font-weight: 600; line-height: 1.1; }
  .summary-lbl {
    font-size: 14px; color: var(--text-muted); margin-top: 4px;
    display: flex; align-items: center; gap: 7px;
  }
  .summary-lbl .swatch { width: 9px; height: 9px; border-radius: 3px; }

  /* Findings */
  .section-title {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 14px;
  }
  .finding {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .finding-head {
    padding: 18px 20px;
  }
  .finding-top {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .finding-id {
    font-size: 13px;
    color: var(--text-soft);
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 3px;
  }
  .finding-name {
    font-size: 17px;
    font-weight: 600;
    margin: 0;
  }
  .finding-badges {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge .swatch { width: 8px; height: 8px; border-radius: 50%; }
  .risk-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .finding-reason {
    margin: 12px 0 0;
    color: var(--text-muted);
    font-size: 15px;
  }
  .review-note {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 12px;
    font-size: 14px;
    color: var(--review-text);
    font-weight: 500;
  }
  .review-note .ic { width: 16px; height: 16px; }

  .details-toggle {
    margin-top: 16px;
    border: 1px solid var(--border);
    background: #fafbfc;
    color: var(--accent);
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: background 0.15s;
  }
  .details-toggle:hover { background: #f2f4f7; }
  .details-toggle .chev { transition: transform 0.18s; width: 15px; height: 15px; }
  .details-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }

  .finding-details {
    border-top: 1px solid var(--border-soft);
    padding: 20px;
    display: grid;
    gap: 18px;
    background: #fcfcfd;
  }
  .detail-block .detail-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .detail-block p { margin: 0; font-size: 15px; }

  .quote {
    background: #f4f5f7;
    border-radius: var(--radius-sm);
    padding: 16px 18px 16px 46px;
    position: relative;
    color: var(--text);
    font-size: 15.5px;
    line-height: 1.6;
  }
  .quote::before {
    content: "\201C";
    position: absolute;
    left: 14px;
    top: 4px;
    font-size: 40px;
    line-height: 1;
    color: #c3c8d2;
    font-family: Georgia, "Times New Roman", serif;
  }

  .reco {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: var(--radius-sm);
    padding: 15px 17px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .reco .ic { width: 20px; height: 20px; color: var(--green-text); flex-shrink: 0; margin-top: 1px; }
  .reco .reco-label {
    font-size: 12px; font-weight: 600; color: var(--green-text);
    letter-spacing: 0.03em; text-transform: uppercase; margin-bottom: 4px;
  }
  .reco p { margin: 0; font-size: 15px; color: #1c4632; }

  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 32px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .detail-meta span strong { color: var(--text); font-weight: 600; }

  /* Actions */
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
  }
  .btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow);
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: #f7f8fa; border-color: #d7dae0; }
  .btn .ic { width: 16px; height: 16px; }

  [dir="rtl"] { text-align: right; }

  @media (max-width: 720px) {
    .page { padding: 22px 16px 48px; }
    .summary-row { grid-template-columns: repeat(2, 1fr); }
    .overall { padding: 22px; gap: 22px; }
    .app-header h1 { font-size: 21px; }
    .finding-top { flex-direction: column; }
    .finding-badges { order: 2; }
  }

  @media print {
    html, body { background: #fff; }
    .page { max-width: 100%; padding: 0; }
    .actions, .details-toggle { display: none !important; }
    .finding-details { display: grid !important; }
    .card, .finding, .summary-item { box-shadow: none; break-inside: avoid; page-break-inside: avoid; }
    .ai-tag { border: 1px solid var(--border); }
    .quote, .reco { background: #fff !important; }
  }
</style>
</head>
<body>
  <div class="page">
    <div id="audit-root"></div>
  </div>

<script>
"use strict";

/* ------------------------------------------------------------------ *
 *  BUSINESS LOGIC  (kept separate from rendering; backend may swap)   *
 * ------------------------------------------------------------------ */

var STATUS_WEIGHT = {
  compliant: 1.0,
  ambiguous: 0.5,
  missing: 0.25,
  non_compliant: 0.0
};

function calculateComplianceScore(findings) {
  if (!Array.isArray(findings) || findings.length === 0) return 100;
  var total = 0;
  findings.forEach(function (f) {
    var w = STATUS_WEIGHT[f.status];
    total += (typeof w === "number") ? w : 0;
  });
  return Math.round((total / findings.length) * 100);
}

function calculateFindingCounts(findings) {
  var counts = { compliant: 0, non_compliant: 0, missing: 0, ambiguous: 0, needs_attention: 0, human_review: 0 };
  if (!Array.isArray(findings)) return counts;
  findings.forEach(function (f) {
    if (counts.hasOwnProperty(f.status)) counts[f.status] += 1;
    if (f.status === "non_compliant" || f.status === "missing" || f.status === "ambiguous") {
      counts.needs_attention += 1;
    }
    if (f.human_review_required) counts.human_review += 1;
  });
  return counts;
}

function calculateOverallDecision(findings) {
  if (!Array.isArray(findings) || findings.length === 0) return "Approved";
  var hardFail = findings.some(function (f) {
    return f.status === "non_compliant" && !f.human_review_required;
  });
  if (hardFail) return "Not Approved";
  var needsHuman = findings.some(function (f) {
    return f.human_review_required || f.status === "non_compliant" ||
           f.status === "missing" || f.status === "ambiguous";
  });
  if (needsHuman) return "Human Review Required";
  return "Approved";
}

/* ------------------------------------------------------------------ *
 *  PRESENTATION HELPERS                                               *
 * ------------------------------------------------------------------ */

var STATUS_META = {
  compliant:     { label: "Compliant",     bg: "--green-bg",  text: "--green-text",  border: "--green-border" },
  non_compliant: { label: "Non-Compliant", bg: "--red-bg",    text: "--red-text",    border: "--red-border" },
  missing:       { label: "Missing",       bg: "--orange-bg", text: "--orange-text", border: "--orange-border" },
  ambiguous:     { label: "Ambiguous",     bg: "--amber-bg",  text: "--amber-text",  border: "--amber-border" }
};

var DECISION_META = {
  "Approved":              { color: "--green-text",  bg: "--green-bg",  border: "--green-border",  icon: "check" },
  "Human Review Required": { color: "--review-text", bg: "--review-bg", border: "--review-border", icon: "eye" },
  "Not Approved":          { color: "--red-text",    bg: "--red-bg",    border: "--red-border",    icon: "x" }
};

function cssv(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function isRTLText(s) {
  return typeof s === "string" && /[؀-ۿݐ-ݿ]/.test(s);
}

function el(tag, className, text) {
  var node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined && text !== null) {
    node.textContent = text;
    if (isRTLText(text)) node.setAttribute("dir", "rtl");
  }
  return node;
}

function icon(name) {
  var svgns = "http://www.w3.org/2000/svg";
  var paths = {
    check: "M20 6L9 17l-5-5",
    x: "M18 6L6 18M6 6l12 12",
    eye: "M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z M12 15a3 3 0 100-6 3 3 0 000 6z",
    chevron: "M6 9l6 6 6-6",
    bulb: "M9 18h6 M10 21h4 M12 3a6 6 0 00-4 10c.7.7 1 1.3 1 2h6c0-.7.3-1.3 1-2a6 6 0 00-4-10z",
    printer: "M6 9V3h12v6 M6 18H4v-6h16v6h-2 M8 14h8v7H8z",
    expand: "M4 8V4h4 M20 8V4h-4 M4 16v4h4 M20 16v4h-4",
    collapse: "M9 4v4H5 M15 4v4h4 M9 20v-4H5 M15 20v-4h4",
    user: "M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2 M12 11a4 4 0 100-8 4 4 0 000 8z"
  };
  var svg = document.createElementNS(svgns, "svg");
  svg.setAttribute("class", "ic");
  svg.setAttribute("viewBox", "0 0 24 24");
  svg.setAttribute("fill", "none");
  svg.setAttribute("stroke", "currentColor");
  svg.setAttribute("stroke-width", "2");
  svg.setAttribute("stroke-linecap", "round");
  svg.setAttribute("stroke-linejoin", "round");
  var d = paths[name] || "";
  d.split(" M").forEach(function (seg, i) {
    var p = document.createElementNS(svgns, "path");
    p.setAttribute("d", (i === 0 ? "" : "M") + seg);
    svg.appendChild(p);
  });
  return svg;
}

function ringColorForDecision(decision) {
  var m = DECISION_META[decision] || DECISION_META["Human Review Required"];
  return cssv(m.color);
}

function formatType(t) {
  if (!t) return "";
  return String(t).replace(/_/g, " ").replace(/\b\w/g, function (c) { return c.toUpperCase(); });
}

/* ------------------------------------------------------------------ *
 *  RENDER SECTIONS                                                    *
 * ------------------------------------------------------------------ */

function renderHeader(data) {
  var header = el("div", "app-header");
  var left = el("div");
  left.appendChild(el("h1", null, data.contract_name || "Untitled Contract"));

  var meta = el("div", "app-meta");
  function fact(label, value) {
    var s = el("span");
    s.appendChild(document.createTextNode(label + " "));
    s.appendChild(el("strong", null, value));
    return s;
  }
  if (data.contract_id) meta.appendChild(fact("ID", data.contract_id));
  if (data.contract_type) meta.appendChild(fact("Type", formatType(data.contract_type)));
  if (data.analysis_date) meta.appendChild(fact("Reviewed", data.analysis_date));
  left.appendChild(meta);
  header.appendChild(left);

  var tag = el("div", "ai-tag");
  tag.appendChild(el("span", "dot"));
  tag.appendChild(document.createTextNode("AI-Assisted Contract Review"));
  header.appendChild(tag);
  return header;
}

function renderRing(score, decision) {
  var size = 132, stroke = 11, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  var offset = c * (1 - Math.max(0, Math.min(100, score)) / 100);
  var color = ringColorForDecision(decision);

  var wrap = el("div", "ring-wrap");
  var ring = el("div", "ring");
  var svgns = "http://www.w3.org/2000/svg";
  var svg = document.createElementNS(svgns, "svg");
  svg.setAttribute("width", size); svg.setAttribute("height", size);
  svg.setAttribute("viewBox", "0 0 " + size + " " + size);

  var track = document.createElementNS(svgns, "circle");
  track.setAttribute("cx", size / 2); track.setAttribute("cy", size / 2);
  track.setAttribute("r", r); track.setAttribute("fill", "none");
  track.setAttribute("stroke", "#eceef2"); track.setAttribute("stroke-width", stroke);

  var prog = document.createElementNS(svgns, "circle");
  prog.setAttribute("cx", size / 2); prog.setAttribute("cy", size / 2);
  prog.setAttribute("r", r); prog.setAttribute("fill", "none");
  prog.setAttribute("stroke", color); prog.setAttribute("stroke-width", stroke);
  prog.setAttribute("stroke-linecap", "round");
  prog.setAttribute("stroke-dasharray", c);
  prog.setAttribute("stroke-dashoffset", offset);

  svg.appendChild(track); svg.appendChild(prog);
  ring.appendChild(svg);

  var label = el("div", "ring-label");
  label.appendChild(el("div", "ring-pct", score + "%"));
  label.appendChild(el("div", "ring-cap", "Compliance"));
  ring.appendChild(label);
  wrap.appendChild(ring);
  return wrap;
}

function renderOverall(data, findings) {
  var score = calculateComplianceScore(findings);
  var decision = calculateOverallDecision(findings);
  var counts = calculateFindingCounts(findings);
  var meta = DECISION_META[decision] || DECISION_META["Human Review Required"];

  var card = el("div", "card overall");
  card.appendChild(renderRing(score, decision));

  var body = el("div", "overall-body");

  var badge = el("div", "decision-badge");
  badge.style.background = cssv(meta.bg);
  badge.style.color = cssv(meta.color);
  badge.style.borderColor = cssv(meta.border);
  badge.appendChild(icon(meta.icon));
  badge.appendChild(document.createTextNode(decision));
  body.appendChild(badge);

  var explainText;
  if (decision === "Not Approved") {
    explainText = "This contract contains clauses that do not meet the required policies and should not be approved as written.";
  } else if (decision === "Human Review Required") {
    explainText = "The contract includes higher-risk clauses that should be reviewed by a privacy specialist before it is approved.";
  } else {
    explainText = "No blocking issues were found. The contract aligns with the checked policies.";
  }
  body.appendChild(el("p", "overall-explain", explainText));

  var facts = el("div", "overall-facts");
  function stat(label, value) {
    var s = el("span");
    s.appendChild(el("strong", null, String(value)));
    s.appendChild(document.createTextNode(" " + label));
    return s;
  }
  facts.appendChild(stat("policies checked", findings.length));
  facts.appendChild(stat("need attention", counts.needs_attention));
  var hr = el("span");
  hr.appendChild(el("strong", null, counts.human_review > 0 ? "Yes" : "No"));
  hr.appendChild(document.createTextNode(" human review"));
  facts.appendChild(hr);
  body.appendChild(facts);

  card.appendChild(body);
  return card;
}

function renderSummary(findings) {
  var counts = calculateFindingCounts(findings);
  var row = el("div", "summary-row");
  var items = [
    { num: counts.compliant, label: "Compliant", color: "--green-text" },
    { num: counts.non_compliant, label: "Non-Compliant", color: "--red-text" },
    { num: counts.needs_attention, label: "Needs Attention", color: "--orange-text" },
    { num: counts.human_review, label: "Human Review", color: "--review-text" }
  ];
  items.forEach(function (it) {
    var box = el("div", "summary-item");
    box.appendChild(el("div", "summary-num", String(it.num)));
    var lbl = el("div", "summary-lbl");
    var sw = el("span", "swatch");
    sw.style.background = cssv(it.color);
    lbl.appendChild(sw);
    lbl.appendChild(document.createTextNode(it.label));
    box.appendChild(lbl);
    row.appendChild(box);
  });
  return row;
}

function renderFinding(f, index) {
  var meta = STATUS_META[f.status] || { label: formatType(f.status), bg: "--amber-bg", text: "--amber-text", border: "--amber-border" };
  var card = el("div", "finding");

  var head = el("div", "finding-head");
  var top = el("div", "finding-top");

  var titleWrap = el("div");
  titleWrap.appendChild(el("div", "finding-id", f.policy_id || ""));
  titleWrap.appendChild(el("p", "finding-name", f.policy_name || f.policy_id || "Policy"));
  top.appendChild(titleWrap);

  var badges = el("div", "finding-badges");
  var statusBadge = el("span", "badge");
  statusBadge.style.background = cssv(meta.bg);
  statusBadge.style.color = cssv(meta.text);
  statusBadge.style.borderColor = cssv(meta.border);
  var sw = el("span", "swatch");
  sw.style.background = cssv(meta.text);
  statusBadge.appendChild(sw);
  statusBadge.appendChild(document.createTextNode(meta.label));
  badges.appendChild(statusBadge);

  if (f.risk_level) {
    badges.appendChild(el("span", "risk-label", formatType(f.risk_level) + " risk"));
  }
  top.appendChild(badges);
  head.appendChild(top);

  if (f.reason) head.appendChild(el("p", "finding-reason", f.reason));

  if (f.human_review_required) {
    var note = el("div", "review-note");
    note.appendChild(icon("user"));
    note.appendChild(document.createTextNode("Privacy specialist review recommended"));
    head.appendChild(note);
  }

  var detailsId = "details-" + (f.policy_id || index);
  var toggle = el("button", "details-toggle");
  toggle.setAttribute("aria-expanded", "false");
  toggle.setAttribute("aria-controls", detailsId);
  var chev = icon("chevron");
  chev.setAttribute("class", "ic chev");
  var toggleLabel = document.createTextNode("View details");
  toggle.appendChild(toggleLabel);
  toggle.appendChild(chev);
  head.appendChild(toggle);
  card.appendChild(head);

  var details = el("div", "finding-details");
  details.id = detailsId;
  details.hidden = true;

  if (f.contract_evidence) {
    var evBlock = el("div", "detail-block");
    evBlock.appendChild(el("div", "detail-label", "Contract evidence"));
    evBlock.appendChild(el("div", "quote", f.contract_evidence));
    details.appendChild(evBlock);
  }
  if (f.reason) {
    var rBlock = el("div", "detail-block");
    rBlock.appendChild(el("div", "detail-label", "Why it failed"));
    rBlock.appendChild(el("p", null, f.reason));
    details.appendChild(rBlock);
  }
  if (f.recommendation) {
    var reco = el("div", "reco");
    reco.appendChild(icon("bulb"));
    var recoText = el("div");
    recoText.appendChild(el("div", "reco-label", "Recommended action"));
    recoText.appendChild(el("p", null, f.recommendation));
    reco.appendChild(recoText);
    details.appendChild(reco);
  }

  var metaRow = el("div", "detail-meta");
  if (f.source_reference) {
    var src = el("span");
    src.appendChild(document.createTextNode("Policy source: "));
    src.appendChild(el("strong", null, f.source_reference));
    metaRow.appendChild(src);
  }
  if (typeof f.confidence === "number") {
    var conf = el("span");
    conf.appendChild(document.createTextNode("Confidence: "));
    conf.appendChild(el("strong", null, Math.round(f.confidence * 100) + "%"));
    metaRow.appendChild(conf);
  }
  var hrv = el("span");
  hrv.appendChild(document.createTextNode("Human review: "));
  hrv.appendChild(el("strong", null, f.human_review_required ? "Required" : "Not required"));
  metaRow.appendChild(hrv);
  details.appendChild(metaRow);

  card.appendChild(details);

  toggle.addEventListener("click", function () {
    var open = details.hidden;
    details.hidden = !open;
    toggle.setAttribute("aria-expanded", open ? "true" : "false");
    toggleLabel.textContent = open ? "Hide details" : "View details";
  });

  return card;
}

function renderActions() {
  var wrap = el("div", "actions");
  function mkBtn(iconName, label, handler) {
    var btn = document.createElement("button");
    btn.className = "btn";
    btn.appendChild(icon(iconName));
    btn.appendChild(document.createTextNode(label));
    btn.addEventListener("click", handler);
    return btn;
  }
  wrap.appendChild(mkBtn("printer", "Print Report", function () { window.print(); }));
  wrap.appendChild(mkBtn("expand", "Expand All", function () { setAllDetails(true); }));
  wrap.appendChild(mkBtn("collapse", "Collapse All", function () { setAllDetails(false); }));
  return wrap;
}

function setAllDetails(open) {
  document.querySelectorAll(".finding-details").forEach(function (d) { d.hidden = !open; });
  document.querySelectorAll(".details-toggle").forEach(function (t) {
    t.setAttribute("aria-expanded", open ? "true" : "false");
    t.childNodes[0].textContent = open ? "Hide details" : "View details";
  });
}

var _currentAudit = null;

/* ------------------------------------------------------------------ *
 *  PUBLIC INTEGRATION FUNCTION  (do not rename)                       *
 * ------------------------------------------------------------------ */

window.renderContractAudit = function (containerId, auditData) {
  var root = document.getElementById(containerId);
  if (!root) return;
  root.textContent = "";
  _currentAudit = auditData || {};
  var findings = Array.isArray(auditData && auditData.findings) ? auditData.findings : [];

  root.appendChild(renderHeader(_currentAudit));

  var report = el("div", "report");
  report.appendChild(renderActions());
  report.appendChild(renderOverall(_currentAudit, findings));
  report.appendChild(renderSummary(findings));

  report.appendChild(el("h2", "section-title", "Findings"));
  if (findings.length === 0) {
    report.appendChild(el("p", "finding-reason", "No findings were returned for this contract."));
  } else {
    findings.forEach(function (f, i) { report.appendChild(renderFinding(f, i)); });
  }
  root.appendChild(report);
};
