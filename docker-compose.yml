services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MOCK=1
      - PGHOST=postgres
      - PGDATABASE=compliance_audit
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - MINIO_ENABLED=1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - postgres
      - minio

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=compliance_audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
